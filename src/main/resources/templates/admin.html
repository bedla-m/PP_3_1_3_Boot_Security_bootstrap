<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
</head>

<div class="bg-dark text-white p-2" th:fragment="header">
    <div class="container d-flex justify-content-between align-items-center">
        <div>
            <p class="mb-0 fs-5">
                Hello, your username: <span class="font-weight-bold" th:text="${profileUser.username}"></span>,
                your role: <span class="font-weight-bold" th:each="role : ${profileUser.roles}"
                                 th:text="${#strings.replace(role.roleName, 'ROLE_', '')}"></span>
            </p>
        </div>

        <div style="text-align: right; padding: 10px;">
            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button class="btn btn-light">Выйти</button>
            </form>
        </div>
    </div>
</div>
<br>

<body class="bg-light min-vh-100">

<div class="container">

    <div class="row">

        <!-- Боковое меню -->
        <div class="col-2">
            <div class="list-group" id="side-menu" role="tablist">
                <a class="list-group-item list-group-item-action active" data-toggle="list" href="#admin-section"
                   role="tab">Admin</a>
                <a class="list-group-item list-group-item-action" data-toggle="list" href="#user-section" role="tab">User</a>
            </div>
        </div>

        <!-- Контент -->
        <div class="col-10">

            <div class="tab-content" id="mainTabContent">

                <!-- Админка -->
                <div class="tab-pane fade show active" id="admin-section" role="tabpanel">
                    <h1>Admin Panel</h1>

                    <!-- Верхние вкладки -->
                    <ul class="nav nav-tabs" id="myTab" role="tablist">
                        <li class="nav-item">
                            <a class="nav-link active" id="users-tab" data-toggle="tab" href="#users_tables" role="tab">Users
                                table</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" id="add-tab" data-toggle="tab" href="#add_user" role="tab">Add user</a>
                        </li>
                    </ul>

                    <div class="tab-content" id="myTabContent">

                        <!-- Таблица -->
                        <div class="tab-pane fade show active" id="users_tables" role="tabpanel">
                            <div class="bg-white border rounded">
                                <div class="bg-light text-black p-2 rounded-top border-bottom">
                                    <h5 class="p-2">All Users</h5>
                                </div>

                                <div class="p-3">
                                    <table class="table table-striped mt-3 bg-white">
                                        <thead>
                                        <tr>
                                            <th>ID</th>
                                            <th>Name</th>
                                            <th>Surname</th>
                                            <th>Age</th>
                                            <th>Username</th>
                                            <th>Role</th>
                                            <th>Edit</th>
                                            <th>Delete</th>
                                        </tr>
                                        </thead>
                                        <tbody>
                                        <tr th:each="user : ${users}">
                                            <td th:text="${user.id}"></td>
                                            <td th:text="${user.name}"></td>
                                            <td th:text="${user.surname}"></td>
                                            <td th:text="${user.age}"></td>
                                            <td th:text="${user.username}"></td>
                                            <td>
                                                <span th:each="role : ${user.roles}"
                                                      th:text="${role.roleName} + ' '"></span>
                                            </td>
                                            <!-- Кнопки в таблице -->
                                            <td>
                                                <!-- Кнопка edit -->
                                                <button type="button" class="btn btn-info btn-sm" data-toggle="modal"
                                                        th:data-target="'#editModal' + ${user.id}">
                                                    Edit
                                                </button>
                                                <!-- Модальное окно -->
                                                <div class="modal fade" th:id="'editModal' + ${user.id}"
                                                     tabindex="-1">
                                                    <div class="modal-dialog modal-lg">
                                                        <div class="modal-content">
                                                            <div class="modal-header">
                                                                <h5 class="modal-title">Edit User</h5>
                                                                <button type="button" class="close"
                                                                        data-dismiss="modal">&times;
                                                                </button>
                                                            </div>
                                                            <div class="modal-body">
                                                                <div th:replace="edit :: editForm(${user}, ${roles})"></div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </td>
                                            <td>
                                                <!-- Кнопка remove -->
                                                <form th:action="@{/delete}" method="post" style="display: inline;">
                                                    <input type="hidden" name="id" th:value="${user.id}"/>
                                                    <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                                                </form>
                                            </td>
                                        </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>

                        <!-- Форма добавления -->
                        <div class="tab-pane fade" id="add_user" role="tabpanel">
                            <div class="bg-white border rounded">
                                <div class="bg-light text-black p-2 rounded-top border-bottom">
                                    <h5 class="p-2">Add New User</h5>
                                </div>
                                <form th:action="@{/save}" th:object="${newUser}" method="post"
                                      autocomplete="off" class="text-center font-weight-bold">
                                    <input type="hidden" th:field="*{id}"/>
                                    <br>

                                    <div class="form-group">
                                        <label>Name</label>
                                        <input type="text" class="form-control w-50 mx-auto" th:field="*{name}"
                                               placeholder="Name">
                                        </label>
                                    </div>

                                    <div class="form-group">
                                        <label>Surname</label>
                                        <input type="text" class="form-control w-50 mx-auto" th:field="*{surname}"
                                               placeholder="Surname">
                                    </div>

                                    <div class="form-group">
                                        <label>Age</label>
                                        <input type="number" class="form-control w-50 mx-auto" th:field="*{age}"
                                               placeholder="Age">
                                    </div>
                                    <div class="form-group">
                                        <label>Username</label>
                                        <input type="text" class="form-control w-50 mx-auto" th:field="*{username}"
                                               placeholder="Username" autocomplete="off">
                                    </div>
                                    <div class="form-group">
                                        <label>Password</label>
                                        <input type="password" class="form-control w-50 mx-auto" th:field="*{password}"
                                               placeholder="Password" autocomplete="new-password">
                                    </div>
                                    <div class="form-group">
                                        <label>Roles</label>
                                        <select multiple class="form-control w-50 mx-auto" name="roleIds">
                                            <option th:each="role : ${roles}" th:text="${role.roleName}"
                                                    th:value="${role.id}">
                                            </option>
                                        </select>
                                        <br>
                                        <button type="submit" class="btn btn-success w-50">Add</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Профиль пользователя -->
                <div class="tab-pane fade" id="user-section" role="tabpanel">
                    <div th:replace="user :: profile"></div>
                </div>

            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
</body>
</html>
